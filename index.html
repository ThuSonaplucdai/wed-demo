<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCADA ULTIMATE - FIXED AXIS EDITION</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

  <style>
    :root {
      --bg: #020617; --card: #1e293b; --primary: #38bdf8;
      --success: #10b981; --danger: #ef4444; --text: #f8fafc;
    }
    body { 
      margin: 0; font-family: 'Segoe UI', sans-serif; 
      background: var(--bg); color: var(--text); overflow: hidden;
      display: flex; flex-direction: column; height: 100vh;
    }

    .home-container { max-width: 1100px; margin: auto; padding: 60px 20px; text-align: center; }
    .station-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
    .station-card {
      background: var(--card); border-radius: 20px; padding: 30px;
      border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer;
    }
    .station-card:hover { transform: translateY(-10px); border-color: var(--primary); }

    .detail-view { display: none; flex-direction: column; height: 100vh; padding: 15px; box-sizing: border-box; }
    .top-nav {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card); padding: 12px 20px; border-radius: 12px; margin-bottom: 15px;
    }

    .main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
    .monitor-item {
      background: var(--card); padding: 20px; border-radius: 15px;
      border-left: 6px solid var(--primary); margin-bottom: 15px;
    }
    .val-display { font-size: 42px; font-weight: 900; }

    /* KHU VỰC BIỂU ĐỒ - KHÔNG DÙNG SCROLLBAR TRÌNH DUYỆT NỮA */
    .chart-box { 
      background: #0f172a; border-radius: 15px; padding: 20px; 
      border: 1px solid rgba(255,255,255,0.05); position: relative;
    }

    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-secondary { background: #334155; color: #fff; }
  </style>
</head>
<body>

<div id="view-home" class="home-container">
  <h1 style="color: var(--primary);">HỆ THỐNG SCADA TRỰC TUYẾN</h1>
  <div class="station-grid">
    <div class="station-card" onclick="switchPage('view-detail')">
      <div style="font-size: 60px;">📊</div>
      <h2>Trạm Giám Sát 01</h2>
      <button class="btn btn-primary">TRUY CẬP NGAY</button>
    </div>
  </div>
</div>

<div id="view-detail" class="detail-view">
  <div class="top-nav">
    <button class="btn btn-secondary" style="width: auto;" onclick="switchPage('view-home')">⬅ QUAY LẠI</button>
    <div id="live-clock" style="font-family: monospace; font-size: 1.3rem; color: var(--primary);">--:--:--</div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="monitor-item" id="card-temp">
        <small>TEMPERATURE</small>
        <div class="val-display"><span id="val-temp">--</span>°C</div>
      </div>
      <div class="monitor-item" style="border-left-color: var(--success);">
        <small>HUMIDITY</small>
        <div class="val-display"><span id="val-hum">--</span>%</div>
      </div>
      
      <button class="btn btn-primary" onclick="setLive()">BÁM SÁT HIỆN TẠI</button>
      <button class="btn btn-secondary" onclick="hmiChart.resetZoom()">XEM TOÀN BỘ 24H</button>
      
      <p style="font-size: 11px; color: #64748b; margin-top: 20px;">
        * Kéo chuột trái trên biểu đồ để xem quá khứ.<br>
        * Trục X/Y luôn cố định để bạn quan sát.
      </p>
    </div>

    <div class="chart-box">
      <canvas id="hmiChart"></canvas>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBWRpQCnDWV5YQpoXZ_o7aqfGdv_7yUT38",
    authDomain: "wed-demo-d236a.firebaseapp.com",
    databaseURL: "https://wed-demo-d236a-default-rtdb.firebaseio.com",
    projectId: "wed-demo-d236a",
    storageBucket: "wed-demo-d236a.firebasestorage.app",
    messagingSenderId: "410178635616",
    appId: "1:410178635616:web:c4d513a888176847198005"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let isLive = true;

  function switchPage(id) {
    document.getElementById('view-home').style.display = (id === 'view-home' ? 'block' : 'none');
    document.getElementById('view-detail').style.display = (id === 'view-detail' ? 'flex' : 'none');
  }

  const ctx = document.getElementById('hmiChart').getContext('2d');
  const hmiChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        { 
          label: 'Nhiệt độ (°C)', data: [], 
          borderColor: '#38bdf8', borderWidth: 3, pointRadius: 2, fill: false, tension: 0.3 
        },
        { 
          label: 'Độ ẩm (%)', data: [], 
          borderColor: '#10b981', borderWidth: 3, pointRadius: 2, fill: false, tension: 0.3 
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { 
          type: 'time', 
          time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#94a3b8' }
        },
        y: { 
          min: 0, max: 100, 
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#94a3b8' }
        }
      },
      plugins: {
        zoom: {
          pan: { 
            enabled: true, 
            mode: 'x', 
            onPanStart: () => isLive = false // Tắt bám đuổi khi người dùng kéo xem quá khứ
          },
          zoom: { wheel: { enabled: true }, mode: 'x' }
        },
        legend: { labels: { color: '#f8fafc' } }
      }
    }
  });

  function setLive() { isLive = true; }

  // Load 24h
  db.ref("history").orderByChild("timestamp").limitToLast(1440).once("value", (snap) => {
    const data = snap.val();
    if (data) {
      const sorted = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
      sorted.forEach(item => {
        hmiChart.data.datasets[0].data.push({ x: item.timestamp, y: item.temp });
        hmiChart.data.datasets[1].data.push({ x: item.timestamp, y: item.hum });
      });
      hmiChart.update();
    }
  });

  // Real-time
  db.ref("data").on("value", (snap) => {
    const val = snap.val();
    if (val) {
      const now = new Date().getTime();
      const t = parseFloat(val.temp);
      const h = parseFloat(val.hum);

      document.getElementById("val-temp").innerText = t;
      document.getElementById("val-hum").innerText = h;

      hmiChart.data.datasets[0].data.push({ x: now, y: t });
      hmiChart.data.datasets[1].data.push({ x: now, y: h });

      if (isLive) {
        const futureGap = 5 * 60 * 1000; 
        const windowSize = 20 * 60 * 1000; // Hiển thị khung hình 20 phút
        hmiChart.options.scales.x.max = now + futureGap;
        hmiChart.options.scales.x.min = now + futureGap - windowSize;
      }
      hmiChart.update('none');
    }
  });

  setInterval(() => { document.getElementById("live-clock").innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
