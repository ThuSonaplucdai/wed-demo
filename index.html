<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>IoT SCADA Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .content {
      padding: 20px;
      padding-bottom: 80px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
    }

    .title {
      font-size: 18px;
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .tabs {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #020617;
      border-top: 1px solid #334155;
    }

    .tab-button {
      flex: 1;
      padding: 15px;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
    }

    .tab-button.active {
      color: #38bdf8;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    button {
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="content">

  <!-- TAB 1 -->
  <div class="tab-content active" id="tab0">
    <div class="card">
      <div class="title">🌡 Nhiệt độ</div>
      <div class="value" id="temp">--</div>
    </div>

    <div class="card">
      <div class="title">💧 Độ ẩm</div>
      <div class="value" id="hum">--</div>
    </div>
  </div>

  <!-- TAB 2 -->
  <div class="tab-content" id="tab1">
    <div class="card">
      <div class="title">Thiết bị</div>
      <button onclick="toggleDevice()">Bật / Tắt</button>
    </div>
  </div>

  <!-- TAB 3 -->
  <div class="tab-content" id="tab2">
    <div class="card">Biểu đồ (sau này thêm)</div>
  </div>

  <!-- TAB 4 -->
  <div class="tab-content" id="tab3">
    <div class="card">Cảnh báo</div>
  </div>

  <!-- TAB 5 -->
  <div class="tab-content" id="tab4">
    <div class="card">Cài đặt</div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tabs">
  <button class="tab-button active" onclick="openTab(0)">Home</button>
  <button class="tab-button" onclick="openTab(1)">Control</button>
  <button class="tab-button" onclick="openTab(2)">Chart</button>
  <button class="tab-button" onclick="openTab(3)">Alert</button>
  <button class="tab-button" onclick="openTab(4)">Setting</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWRpQCnDWV5YQpoXZ_o7aqfGdv_7yUT38",
  authDomain: "wed-demo-d236a.firebaseapp.com",
  databaseURL: "https://wed-demo-d236a-default-rtdb.firebaseio.com",
  projectId: "wed-demo-d236a",
  storageBucket: "wed-demo-d236a.firebasestorage.app",
  messagingSenderId: "410178635616",
  appId: "1:410178635616:web:c4d513a888176847198005",
  measurementId: "G-BH83JZJ8CN"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// LẤY DỮ LIỆU REALTIME
db.ref("data").on("value", function(snapshot) {
  let data = snapshot.val();

  if (data) {
    document.getElementById("temp").innerText = data.temp + " °C";
    document.getElementById("hum").innerText = data.hum + " %";
  }
});

// GỬI LỆNH (bật/tắt)
function toggleDevice() {
  db.ref("device").set({
    status: Math.random() > 0.5 ? 1 : 0
  });
}

// TAB SWITCH
function openTab(index) {
  let tabs = document.querySelectorAll(".tab-content");
  let buttons = document.querySelectorAll(".tab-button");

  tabs.forEach(t => t.classList.remove("active"));
  buttons.forEach(b => b.classList.remove("active"));

  tabs[index].classList.add("active");
  buttons[index].classList.add("active");
}
</script>

</body>
</html>
