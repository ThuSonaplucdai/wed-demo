<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCADA ULTIMATE EDITION - 24H PERSISTENT</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <style>
    :root {
      --bg: #020617; --card: #1e293b; --primary: #38bdf8;
      --success: #10b981; --danger: #ef4444; --text: #f8fafc;
    }
    body { 
      margin: 0; font-family: 'Segoe UI', sans-serif; 
      background: var(--bg); color: var(--text); overflow-x: hidden;
      display: flex; flex-direction: column; height: 100vh;
    }

    #status-bar {
      position: fixed; top: 0; width: 100%; height: 35px; line-height: 35px;
      z-index: 9999; font-weight: bold; text-align: center; display: none;
    }

    .home-container { max-width: 1100px; margin: auto; padding: 60px 20px; text-align: center; }
    .station-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
    
    .station-card {
      background: var(--card); border-radius: 20px; padding: 30px;
      border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer;
    }
    .station-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(56,189,248,0.1); }

    .detail-view { display: none; flex-direction: column; height: 100vh; padding: 15px; }

    .top-nav {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card); padding: 12px 20px; border-radius: 12px; margin-bottom: 15px;
    }

    .main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 15px; flex-grow: 1; }
    
    .monitor-item {
      background: var(--card); padding: 20px; border-radius: 15px;
      border-left: 6px solid var(--primary); margin-bottom: 15px;
    }

    .val-display { font-size: 42px; font-weight: 900; }

    .chart-viewport { 
      background: #0f172a; border-radius: 15px; overflow: auto; flex-grow: 1;
    }
    
    .chart-wrapper { width: 10000px; height: 1000px; }

    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-primary { background: var(--primary); }

    .alarm-red { animation: blink-red 1s infinite; border-left-color: var(--danger) !important; }
    @keyframes blink-red { 100% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } }
  </style>
</head>
<body>

<div id="status-bar"></div>

<div id="view-home" class="home-container">
  <h1 style="color: var(--primary);">HỆ THỐNG SCADA</h1>
  <div class="station-grid">
    <div class="station-card" onclick="switchPage('view-detail')">
      <h2>Trạm 01</h2>
      <button class="btn btn-primary">TRUY CẬP</button>
    </div>
  </div>
</div>

<div id="view-detail" class="detail-view">
  <div class="top-nav">
    <button onclick="switchPage('view-home')">⬅</button>
    <div id="live-clock"></div>
  </div>

  <div class="main-layout">
    <div>
      <div class="monitor-item" id="card-temp">
        <div class="val-display"><span id="val-temp">--</span>°C</div>
      </div>
      <div class="monitor-item">
        <div class="val-display"><span id="val-hum">--</span>%</div>
      </div>
      <button class="btn btn-primary" onclick="scrollToEnd()">BÁM SÁT HIỆN TẠI</button>
    </div>

    <div class="chart-viewport" id="viewport">
      <div class="chart-wrapper">
        <canvas id="hmiChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  databaseURL: "https://wed-demo-d236a-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const bar = document.getElementById("status-bar");
let autoScroll = true;

function switchPage(id) {
  document.getElementById('view-home').style.display = id==='view-home'?'block':'none';
  document.getElementById('view-detail').style.display = id==='view-detail'?'flex':'none';
}

const ctx = document.getElementById('hmiChart').getContext('2d');
const hmiChart = new Chart(ctx, {
  type: 'line',
  data: { datasets: [{data:[]},{data:[]}] },
  options: { scales:{ x:{type:'time'}, y:{min:0,max:100} } }
});

// SCROLL LOGIC
const viewport = document.getElementById('viewport');

viewport.addEventListener('scroll', () => {
  autoScroll = false;

  const percent = viewport.scrollLeft / (viewport.scrollWidth - viewport.clientWidth);
  const data = hmiChart.data.datasets[0].data;
  if (data.length < 2) return;

  const start = data[0].x;
  const end = data[data.length - 1].x;
  const range = (end - start) * 0.1;

  const center = start + percent * (end - start);

  hmiChart.options.scales.x.min = center - range;
  hmiChart.options.scales.x.max = center + range;

  hmiChart.update('none');
});

function scrollToEnd() {
  viewport.scrollLeft = viewport.scrollWidth;

  const now = Date.now();
  hmiChart.options.scales.x.min = now - 3600000;
  hmiChart.options.scales.x.max = now;

  autoScroll = true;
  hmiChart.update();
}

// REALTIME
db.ref("data").on("value", snap=>{
  const val = snap.val();
  if(!val) return;

  const now = Date.now();
  const t = parseFloat(val.temp)||0;
  const h = parseFloat(val.hum)||0;

  val-temp.innerText=t;
  val-hum.innerText=h;

  hmiChart.data.datasets[0].data.push({x:now,y:t});
  hmiChart.data.datasets[1].data.push({x:now,y:h});

  hmiChart.update('none');

  if(autoScroll) scrollToEnd();
});

// STATUS MARQUEE
db.ref(".info/connected").on("value", snap=>{
  if(snap.val()){
    bar.style.display="block";
    bar.style.background="#10b981";
    bar.innerHTML=`<marquee>✅ HỆ THỐNG TRỰC TUYẾN</marquee>`;
  }else{
    bar.style.display="block";
    bar.style.background="#ef4444";
    bar.innerHTML=`<marquee>⚠️ MẤT KẾT NỐI SERVER</marquee>`;
  }
});

// CLOCK
setInterval(()=>{
  live-clock.innerText=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
