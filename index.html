<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SCADA SYSTEM FULL</title>

<style>
body {
  background: #0a1a2f;
  color: #fff;
  text-align: center;
  font-family: Arial;
}

h2 { color: cyan; }

.panel {
  margin: 10px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

button {
  padding: 10px 20px;
  margin-bottom: 10px;
  background: orange;
  border: none;
  cursor: pointer;
}

svg {
  background: #111;
  border: 2px solid #333;
}

/* Tank */
.tank {
  fill: #333;
  stroke: white;
  stroke-width: 2;
}

/* Water */
.water {
  fill: #00bfff;
  transition: all 0.5s;
}

/* Pipe */
.pipe {
  stroke-width: 12;
  fill: none;
}

.cold {
  stroke: #00bfff;
  stroke-dasharray: 10;
  animation: flow 1s linear infinite;
}

.hot {
  stroke: red;
  stroke-dasharray: 10;
  animation: flow 1s linear infinite reverse;
}

@keyframes flow {
  from { stroke-dashoffset: 0; }
  to { stroke-dashoffset: 30; }
}

/* Pump */
.pump {
  fill: green;
  transition: 0.3s;
}

.pump.off {
  fill: gray;
}

/* Valve */
.valve {
  fill: yellow;
}
</style>

</head>
<body>

<h2>🔥 SCADA MONITORING SYSTEM</h2>

<div class="panel">
  <div>🌡 Temp: <span id="temp">25</span> °C</div>
  <div>💧 Level: <span id="level">50</span> %</div>
  <div>⚡ Pressure: <span id="pressure">1.2</span> bar</div>
</div>

<button onclick="togglePump()">ON / OFF PUMP</button>

<svg viewBox="0 0 1000 500">

  <!-- Tank -->
  <rect x="400" y="120" width="200" height="260" rx="100" class="tank"/>

  <!-- Water -->
  <rect id="water" x="400" y="250" width="200" height="130" class="water"/>

  <!-- Pipes -->
  <line id="pipe_in" x1="100" y1="250" x2="400" y2="250" class="pipe cold"/>
  <line id="pipe_out" x1="600" y1="250" x2="900" y2="250" class="pipe hot"/>

  <!-- Pump -->
  <circle id="pump" cx="100" cy="250" r="40" class="pump"/>
  <text x="80" y="255">P1</text>

  <!-- Valve -->
  <rect x="580" y="220" width="20" height="60" class="valve"/>

</svg>

<script>
let temp = 25;
let level = 50;
let pressure = 1.2;
let pumpOn = true;

function togglePump() {
  pumpOn = !pumpOn;
  document.getElementById("pump").classList.toggle("off");

  document.getElementById("pipe_in").style.animation = pumpOn ? "" : "none";
  document.getElementById("pipe_out").style.animation = pumpOn ? "" : "none";
}

setInterval(() => {

  if (pumpOn) {
    level += Math.random() * 2;
    pressure += Math.random() * 0.1;
  } else {
    level -= Math.random() * 1.5;
    pressure -= Math.random() * 0.05;
  }

  temp += (Math.random() * 2 - 1);

  level = Math.max(0, Math.min(100, level));
  pressure = Math.max(0, pressure);

  document.getElementById("temp").innerText = temp.toFixed(1);
  document.getElementById("level").innerText = level.toFixed(0);
  document.getElementById("pressure").innerText = pressure.toFixed(2);

  let water = document.getElementById("water");
  let height = level * 2.6;
  water.setAttribute("y", 380 - height);
  water.setAttribute("height", height);

}, 1000);
</script>

</body>
</html>
