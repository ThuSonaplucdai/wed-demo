<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>IoT Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    /* Thanh tab */
    .tabs {
      display: flex;
      background: #333;
    }

    .tab-button {
      flex: 1;
      padding: 15px;
      color: white;
      background: #333;
      border: none;
      cursor: pointer;
    }

    .tab-button:hover {
      background: #555;
    }

    .tab-button.active {
      background: #007bff;
    }

    /* Nội dung tab */
    .tab-content {
      display: none;
      padding: 20px;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-button active" onclick="openTab(0)">Tab 1</button>
    <button class="tab-button" onclick="openTab(1)">Tab 2</button>
    <button class="tab-button" onclick="openTab(2)">Tab 3</button>
    <button class="tab-button" onclick="openTab(3)">Tab 4</button>
    <button class="tab-button" onclick="openTab(4)">Tab 5</button>
  </div>

  <!-- Nội dung -->
  <div class="tab-content active">Nội dung Tab 1</div>
  <div class="tab-content">Nội dung Tab 2</div>
  <div class="tab-content">Nội dung Tab 3</div>
  <div class="tab-content">Nội dung Tab 4</div>
  <div class="tab-content">Nội dung Tab 5</div>

  <script>
    function openTab(index) {
      let tabs = document.querySelectorAll(".tab-content");
      let buttons = document.querySelectorAll(".tab-button");

      tabs.forEach(tab => tab.classList.remove("active"));
      buttons.forEach(btn => btn.classList.remove("active"));

      tabs[index].classList.add("active");
      buttons[index].classList.add("active");
    }
  </script>

</body>
</html>
