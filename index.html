<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCADA ULTIMATE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<style>
:root {
  --bg:#020617; --card:#1e293b; --primary:#38bdf8;
  --success:#10b981; --danger:#ef4444; --text:#f8fafc;
}
body {
  margin:0; font-family:Segoe UI;
  background:var(--bg); color:var(--text);
  display:flex; flex-direction:column; height:100vh;
}

#status-bar{
  position:fixed; top:0; width:100%;
  height:35px; line-height:35px;
  text-align:center; font-weight:bold;
  display:none; z-index:9999;
}

.home-container{padding:60px;text-align:center}
.station-card{
  background:var(--card); padding:30px;
  border-radius:20px; cursor:pointer;
}

.detail-view{display:none;flex-direction:column;height:100vh;padding:15px}

.chart-viewport{
  overflow:auto; background:#0f172a;
  border-radius:15px; flex-grow:1;
}
.chart-wrapper{width:10000px;height:1000px}

.btn{padding:12px;border:none;border-radius:8px;font-weight:bold}
.btn-primary{background:var(--primary)}

.alarm-red{border-left:6px solid red}
</style>
</head>

<body>

<div id="status-bar"></div>

<div id="view-home" class="home-container">
  <h1>HỆ THỐNG SCADA</h1>
  <div class="station-card" onclick="switchPage('view-detail')">
    TRUY CẬP
  </div>
</div>

<div id="view-detail" class="detail-view">

  <button onclick="switchPage('view-home')">⬅</button>
  <div id="live-clock"></div>

  <div>
    <div id="card-temp">
      <span id="val-temp">--</span>°C
    </div>
    <div>
      <span id="val-hum">--</span>%
    </div>
    <button class="btn btn-primary" onclick="scrollToEnd()">REALTIME</button>
  </div>

  <div class="chart-viewport" id="viewport">
    <div class="chart-wrapper">
      <canvas id="hmiChart"></canvas>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// FIREBASE
const firebaseConfig={
  apiKey:"AIza...",
  databaseURL:"https://wed-demo-d236a-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// UI
const bar=document.getElementById("status-bar");
const viewport=document.getElementById("viewport");

let autoScroll=true;

// CHART
const ctx=document.getElementById("hmiChart").getContext("2d");
const hmiChart=new Chart(ctx,{
  type:"line",
  data:{
    datasets:[
      {label:"Temp",data:[],borderColor:"#38bdf8"},
      {label:"Hum",data:[],borderColor:"#10b981"}
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    scales:{
      x:{type:"time"},
      y:{min:0,max:100}
    }
  }
});

// SWITCH PAGE
function switchPage(id){
  view-home.style.display=id==="view-home"?"block":"none";
  view-detail.style.display=id==="view-detail"?"flex":"none";
}

// REALTIME BUTTON
function scrollToEnd(){
  viewport.scrollLeft=viewport.scrollWidth;
  autoScroll=true;
}

// SCROLL -> KHÓA VIEW
viewport.addEventListener("scroll",()=>{
  autoScroll=false;
});

// DATA REALTIME
db.ref("data").on("value",snap=>{
  const v=snap.val();
  if(!v)return;

  const now=Date.now();
  const t=parseFloat(v.temp)||0;
  const h=parseFloat(v.hum)||0;

  val-temp.innerText=t;
  val-hum.innerText=h;

  if(t>45) card-temp.classList.add("alarm-red");
  else card-temp.classList.remove("alarm-red");

  hmiChart.data.datasets[0].data.push({x:now,y:t});
  hmiChart.data.datasets[1].data.push({x:now,y:h});

  hmiChart.update("none");

  if(autoScroll) scrollToEnd();
});

// STATUS (CHẠY NGANG)
db.ref(".info/connected").on("value",snap=>{
  if(snap.val()){
    bar.style.display="block";
    bar.style.background="#10b981";
    bar.innerHTML=`<marquee scrollamount="10">
    ✅ KẾT NỐI SERVER THÀNH CÔNG - HỆ THỐNG HOẠT ĐỘNG ỔN ĐỊNH
    </marquee>`;
    setTimeout(()=>bar.style.display="none",4000);
  }else{
    bar.style.display="block";
    bar.style.background="#ef4444";
    bar.innerHTML=`<marquee scrollamount="10">
    ⚠️ MẤT KẾT NỐI - KIỂM TRA INTERNET NGAY
    </marquee>`;
  }
});

// CLOCK
setInterval(()=>{
  live-clock.innerText=new Date().toLocaleTimeString();
},1000);

</script>

</body>
</html>
