<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCADA Pro - Khang</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --primary: #38bdf8;
      --success: #10b981; --danger: #ef4444; --text: #f8fafc;
    }

    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* THÔNG BÁO KẾT NỐI */
    #status-bar { position: fixed; top: 0; width: 100%; z-index: 999; height: 35px; line-height: 35px; font-weight: bold; display: none; }
    .bg-error { background: var(--danger); }
    .bg-success { background: var(--success); }

    /* TRANG CHỦ */
    .container { max-width: 1000px; margin: auto; padding: 60px 20px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
    
    .product-card { 
      background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #334155; 
      transition: 0.3s; cursor: pointer; position: relative;
    }
    .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
    
    .product-info { padding: 20px; }
    .product-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 40px; background: rgba(255,255,255,0.02); }

    /* TRẠNG THÁI CHƯA HOÀN THIỆN (TRẠM 2) */
    .locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
    .badge-comming { position: absolute; top: 10px; right: 10px; background: #f59e0b; color: #000; padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; }

    /* TRANG CHI TIẾT */
    .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
    .top-bar { display: flex; align-items: center; margin-bottom: 20px; }
    .btn-back { background: #334155; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }

    /* BỐ CỤC SCADA CÓ BIỂU ĐỒ */
    .scada-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
    @media (max-width: 768px) { .scada-layout { grid-template-columns: 1fr; } }

    .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary); margin-bottom: 15px; }
    .chart-container { background: var(--card); padding: 20px; border-radius: 15px; height: 400px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div id="status-bar"></div>

<div id="page-home" class="container">
  <h1 style="text-align: center; color: var(--primary);">HỆ THỐNG SCADA</h1>
  <div class="product-grid">
    <div class="product-card" onclick="showPage('page-tram1')">
      <div class="product-img">📈</div>
      <div class="product-info">
        <h3>Trạm Giám Sát 01</h3>
        <p style="color: #94a3b8; font-size: 14px;">Giám sát biểu đồ nhiệt độ & độ ẩm thời gian thực.</p>
        <button style="width:100%; padding:10px; border-radius:8px; border:none; background:var(--primary); font-weight:bold;">MỞ HỆ THỐNG</button>
      </div>
    </div>

    <div class="product-card locked">
      <span class="badge-comming">COMING SOON</span>
      <div class="product-img">🔒</div>
      <div class="product-info">
        <h3>Trạm Giám Sát 02</h3>
        <p style="color: #94a3b8; font-size: 14px;">Thông tin đang được cập nhật. Vui lòng quay lại sau.</p>
        <button disabled style="width:100%; padding:10px; border-radius:8px; border:none; background:#475569;">ĐANG CẬP NHẬT...</button>
      </div>
    </div>
  </div>
</div>

<div id="page-tram1" class="page">
  <div class="top-bar">
    <button class="btn-back" onclick="showPage('page-home')">⬅ Quay lại</button>
    <h2 style="margin-left: 20px; color: var(--primary);">GIÁM SÁT TRẠM 01</h2>
  </div>

  <div class="scada-layout">
    <div class="stats-col">
      <div class="stat-card">
        <small style="color: #94a3b8;">NHIỆT ĐỘ</small>
        <div style="font-size: 40px; font-weight: bold;"><span id="temp">--</span>°C</div>
      </div>
      <div class="stat-card" style="border-left-color: var(--success);">
        <small style="color: #94a3b8;">ĐỘ ẨM</small>
        <div style="font-size: 40px; font-weight: bold;"><span id="hum">--</span>%</div>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="myChart"></canvas>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBWRpQCnDWV5YQpoXZ_o7aqfGdv_7yUT38",
    authDomain: "wed-demo-d236a.firebaseapp.com",
    databaseURL: "https://wed-demo-d236a-default-rtdb.firebaseio.com",
    projectId: "wed-demo-d236a",
    storageBucket: "wed-demo-d236a.firebasestorage.app",
    messagingSenderId: "410178635616",
    appId: "1:410178635616:web:c4d513a888176847198005"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // CHUYỂN TRANG
  function showPage(id) {
    document.getElementById('page-home').style.display = (id === 'page-home' ? 'block' : 'none');
    document.getElementById('page-tram1').style.display = (id === 'page-tram1' ? 'block' : 'none');
  }

  // THÔNG BÁO KẾT NỐI
  const statusBar = document.getElementById("status-bar");
  db.ref(".info/connected").on("value", (snap) => {
    if (snap.val() === true) {
      statusBar.className = "bg-success"; statusBar.style.display = "block";
      statusBar.innerHTML = `<marquee scrollamount="10" loop="1">✅ ĐÃ KẾT NỐI TRẠM 01 THÀNH CÔNG</marquee>`;
      setTimeout(() => { statusBar.style.display = "none"; }, 5000);
    } else {
      statusBar.className = "bg-error"; statusBar.style.display = "block";
      statusBar.innerHTML = `<marquee scrollamount="8">⚠️ ĐANG MẤT KẾT NỐI VỚI HỆ THỐNG...</marquee>`;
    }
  });

  // KHỞI TẠO BIỂU ĐỒ
  const ctx = document.getElementById('myChart').getContext('2d');
  const myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [], // Thời gian
      datasets: [
        { label: 'Nhiệt độ (°C)', data: [], borderColor: '#38bdf8', tension: 0.4, fill: false },
        { label: 'Độ ẩm (%)', data: [], borderColor: '#10b981', tension: 0.4, fill: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { grid: { display: false } } },
      plugins: { legend: { labels: { color: 'white' } } }
    }
  });

  // LẤY DỮ LIỆU & VẼ BIỂU ĐỒ
  db.ref("data").on("value", (snapshot) => {
    const data = snapshot.val();
    if (data) {
      const t = data.temp || 0;
      const h = data.hum || 0;
      const now = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      // Cập nhật số
      document.getElementById("temp").innerText = t;
      document.getElementById("hum").innerText = h;

      // Cập nhật biểu đồ (giữ lại 10 điểm gần nhất)
      if (myChart.data.labels.length > 10) {
        myChart.data.labels.shift();
        myChart.data.datasets[0].data.shift();
        myChart.data.datasets[1].data.shift();
      }
      myChart.data.labels.push(now);
      myChart.data.datasets[0].data.push(t);
      myChart.data.datasets[1].data.push(h);
      myChart.update();
    }
  });
</script>
</body>
</html>
