<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCADA Advanced - Khang</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --primary: #38bdf8;
      --success: #10b981; --danger: #ef4444; --text: #f8fafc;
    }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    
    /* STATUS BAR */
    #status-bar { position: fixed; top: 0; width: 100%; z-index: 1000; height: 35px; line-height: 35px; font-weight: bold; display: none; text-align: center; }
    .bg-error { background: var(--danger); }
    .bg-success { background: var(--success); }

    /* HOME PAGE */
    .container { max-width: 1100px; margin: auto; padding: 60px 20px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
    .product-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; cursor: pointer; position: relative; }
    .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
    .product-info { padding: 20px; }
    .product-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 40px; background: rgba(255,255,255,0.02); }
    .locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }

    /* PAGE TRAM 1 */
    .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 12px; }
    .btn-back { background: #334155; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
    
    .scada-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
    @media (max-width: 900px) { .scada-layout { grid-template-columns: 1fr; } }

    .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary); margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .chart-box { background: var(--card); padding: 20px; border-radius: 15px; height: 500px; position: relative; }
    
    .chart-controls { position: absolute; top: 10px; right: 20px; z-index: 10; }
    .btn-reset { background: var(--primary); color: #000; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div id="status-bar"></div>

<div id="page-home" class="container">
  <h1 style="text-align: center; color: var(--primary); margin-bottom: 40px;">HỆ THỐNG GIÁM SÁT TRỰC TUYẾN</h1>
  <div class="product-grid">
    <div class="product-card" onclick="showPage('page-tram1')">
      <div class="product-img">📊</div>
      <div class="product-info">
        <h3>Trạm Giám Sát 01</h3>
        <p style="color: #94a3b8; font-size: 14px;">Nâng cấp: Biểu đồ thời gian thực tích hợp Zoom & Lịch sử ngày tháng.</p>
        <button style="width:100%; padding:12px; border-radius:8px; border:none; background:var(--primary); font-weight:bold; cursor:pointer;">TRUY CẬP</button>
      </div>
    </div>

    <div class="product-card locked">
      <div class="product-img">🔒</div>
      <div class="product-info">
        <h3>Trạm Giám Sát 02</h3>
        <p style="color: #94a3b8; font-size: 14px;">Đang cập nhật nội dung hệ thống...</p>
        <button disabled style="width:100%; padding:12px; border-radius:8px; border:none; background:#475569;">CHƯA SẴN SÀNG</button>
      </div>
    </div>
  </div>
</div>

<div id="page-tram1" class="page">
  <div class="top-bar">
    <button class="btn-back" onclick="showPage('page-home')">⬅ QUAY LẠI TRANG CHỦ</button>
    <div style="text-align: right;">
        <div style="color: var(--primary); font-weight: bold;">TRẠM 01: REAL-TIME MONITORING</div>
        <small id="live-clock" style="color: #94a3b8;"></small>
    </div>
  </div>

  <div class="scada-layout">
    <div class="stats-col">
      <div class="stat-card">
        <div style="font-size: 12px; color: var(--primary); margin-bottom: 5px;">NHIỆT ĐỘ</div>
        <div style="font-size: 42px; font-weight: 800;"><span id="temp">--</span><span style="font-size: 20px; color: #64748b; margin-left: 5px;">°C</span></div>
      </div>
      <div class="stat-card" style="border-left-color: var(--success);">
        <div style="font-size: 12px; color: var(--success); margin-bottom: 5px;">ĐỘ ẨM</div>
        <div style="font-size: 42px; font-weight: 800;"><span id="hum">--</span><span style="font-size: 20px; color: #64748b; margin-left: 5px;">%</span></div>
      </div>
      <div style="padding: 10px; font-size: 12px; color: #64748b; font-style: italic;">
        * Sử dụng chuột để Zoom, giữ chuột trái để kéo biểu đồ.
      </div>
    </div>

    <div class="chart-box">
      <div class="chart-controls">
        <button class="btn-reset" onclick="resetZoom()">RESET ZOOM</button>
      </div>
      <canvas id="scadaChart"></canvas>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBWRpQCnDWV5YQpoXZ_o7aqfGdv_7yUT38",
    authDomain: "wed-demo-d236a.firebaseapp.com",
    databaseURL: "https://wed-demo-d236a-default-rtdb.firebaseio.com",
    projectId: "wed-demo-d236a",
    storageBucket: "wed-demo-d236a.firebasestorage.app",
    messagingSenderId: "410178635616",
    appId: "1:410178635616:web:c4d513a888176847198005"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function showPage(id) {
    document.getElementById('page-home').style.display = (id === 'page-home' ? 'block' : 'none');
    document.getElementById('page-tram1').style.display = (id === 'page-tram1' ? 'block' : 'none');
  }

  // --- CẤU HÌNH BIỂU ĐỒ NÂNG CẤP ---
  const ctx = document.getElementById('scadaChart').getContext('2d');
  const scadaChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        { label: 'Nhiệt độ (°C)', data: [], borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', tension: 0.3, fill: true, pointRadius: 4 },
        { label: 'Độ ẩm (%)', data: [], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', tension: 0.3, fill: true, pointRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'second', displayFormats: { second: 'HH:mm:ss', minute: 'HH:mm', hour: 'dd/MM HH:mm' } },
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#94a3b8' }
        },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }
      },
      plugins: {
        legend: { labels: { color: 'white', font: { size: 14 } } },
        zoom: {
          pan: { enabled: true, mode: 'x' },
          zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }
        },
        tooltip: {
            callbacks: {
                title: (context) => {
                    const d = new Date(context[0].parsed.x);
                    return d.toLocaleString('vi-VN'); // Hiển thị đầy đủ ngày tháng năm giờ phút giây khi rê chuột
                }
            }
        }
      }
    }
  });

  function resetZoom() { scadaChart.resetZoom(); }

  // --- CẬP NHẬT DỮ LIỆU TỪ FIREBASE ---
  db.ref("data").on("value", (snapshot) => {
    const data = snapshot.val();
    if (data) {
      const now = new Date();
      const t = parseFloat(data.temp) || 0;
      const h = parseFloat(data.hum) || 0;

      document.getElementById("temp").innerText = t;
      document.getElementById("hum").innerText = h;
      document.getElementById("live-clock").innerText = now.toLocaleString('vi-VN');

      // Thêm dữ liệu vào biểu đồ
      scadaChart.data.datasets[0].data.push({ x: now, y: t });
      scadaChart.data.datasets[1].data.push({ x: now, y: h });

      // Giới hạn hiển thị 30 điểm để biểu đồ mượt, nhưng vẫn có thể Zoom/Pan nếu cần
      if (scadaChart.data.datasets[0].data.length > 50) {
        scadaChart.data.datasets[0].data.shift();
        scadaChart.data.datasets[1].data.shift();
      }
      scadaChart.update('quiet'); // Cập nhật mượt mà
    }
  });

  // --- TRẠNG THÁI KẾT NỐI ---
  const statusBar = document.getElementById("status-bar");
  db.ref(".info/connected").on("value", (snap) => {
    if (snap.val() === true) {
      statusBar.className = "bg-success"; statusBar.style.display = "block";
      statusBar.innerHTML = `<marquee scrollamount="10" loop="1">✅ HỆ THỐNG TRỰC TUYẾN - ĐANG NHẬN DỮ LIỆU</marquee>`;
      setTimeout(() => { statusBar.style.display = "none"; }, 5000);
    } else {
      statusBar.className = "bg-error"; statusBar.style.display = "block";
      statusBar.innerHTML = `<marquee scrollamount="8">⚠️ MẤT KẾT NỐI VỚI MÁY CHỦ FIREBASE!</marquee>`;
    }
  });
</script>
</body>
</html>
