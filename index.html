<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>SCADA PRO - FUTURE TIME MODE</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    :root { --bg: #020617; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --text: #f8fafc; }
    body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    .main-layout { display: grid; grid-template-columns: 250px 1fr; gap: 10px; padding: 10px; flex-grow: 1; min-height: 0; }
    .monitor-item { background: var(--card); padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); margin-bottom: 10px; }
    .val-display { font-size: 35px; font-weight: bold; }
    
    /* KHU VỰC BIỂU ĐỒ CÓ THANH TRƯỢT */
    .chart-viewport { 
      background: #0b1120; border-radius: 10px; border: 1px solid #1e293b; 
      overflow: auto; position: relative; 
    }
    .chart-wrapper { width: 3000px; height: 100%; min-height: 500px; }
    
    /* Thanh cuộn chuyên nghiệp */
    .chart-viewport::-webkit-scrollbar { width: 8px; height: 8px; }
    .chart-viewport::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .chart-viewport::-webkit-scrollbar-thumb:hover { background: var(--primary); }
  </style>
</head>
<body>

<div class="main-layout">
  <div class="sidebar">
    <div class="monitor-item">
      <small>NHIỆT ĐỘ</small>
      <div class="val-display"><span id="val-temp">--</span>°C</div>
    </div>
    <div class="monitor-item" style="border-left-color: var(--success);">
      <small>ĐỘ ẨM</small>
      <div class="val-display"><span id="val-hum">--</span>%</div>
    </div>
    <button onclick="scrollToEnd()" style="width:100%; padding:10px; cursor:pointer; background:var(--primary); border:none; border-radius:5px; font-weight:bold;">BÁM SÁT HIỆN TẠI</button>
  </div>

  <div class="chart-viewport" id="viewport">
    <div class="chart-wrapper">
      <canvas id="hmiChart"></canvas>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // Cấu hình Firebase của Khang
  const firebaseConfig = {
    apiKey: "AIzaSyBWRpQCnDWV5YQpoXZ_o7aqfGdv_7yUT38",
    authDomain: "wed-demo-d236a.firebaseapp.com",
    databaseURL: "https://wed-demo-d236a-default-rtdb.firebaseio.com",
    projectId: "wed-demo-d236a",
    storageBucket: "wed-demo-d236a.firebasestorage.app",
    messagingSenderId: "410178635616",
    appId: "1:410178635616:web:c4d513a888176847198005"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const ctx = document.getElementById('hmiChart').getContext('2d');
  const hmiChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        { 
          label: 'Nhiệt độ (°C)', 
          data: [], 
          borderColor: '#38bdf8', 
          backgroundColor: 'rgba(56, 189, 248, 0.2)', // Giữ màu rõ nét
          fill: true, 
          tension: 0.3,
          pointRadius: 4,
          borderWidth: 3
        },
        { 
          label: 'Độ ẩm (%)', 
          data: [], 
          borderColor: '#10b981', 
          backgroundColor: 'rgba(16, 185, 129, 0.1)', 
          fill: true, 
          tension: 0.3,
          pointRadius: 4,
          borderWidth: 3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      scales: {
        x: { 
          type: 'time', 
          time: { unit: 'second', displayFormats: { second: 'HH:mm:ss' } },
          grid: { color: '#1e293b' }
        },
        y: { 
          min: 0, max: 100, 
          grid: { color: '#1e293b' } 
        }
      },
      plugins: {
        tooltip: { enabled: true, mode: 'index', intersect: false }
      }
    }
  });

  function scrollToEnd() {
    const v = document.getElementById('viewport');
    v.scrollLeft = v.scrollWidth;
  }

  // Lắng nghe dữ liệu
  db.ref("data").on("value", (snap) => {
    const val = snap.val();
    if (val) {
      const now = new Date().getTime();
      const t = parseFloat(val.temp);
      const h = parseFloat(val.hum);

      document.getElementById("val-temp").innerText = t;
      document.getElementById("val-hum").innerText = h;

      hmiChart.data.datasets[0].data.push({ x: now, y: t });
      hmiChart.data.datasets[1].data.push({ x: now, y: h });

      // CƠ CHẾ TIẾN ĐẾN TƯƠNG LAI
      // Hiển thị khung nhìn rộng 10 phút, nhưng Max là "Bây giờ + 2 phút"
      const futureGap = 2 * 60 * 1000; // Khoảng trống tương lai 2 phút
      const viewWindow = 10 * 60 * 1000; // Tổng độ rộng khung hình 10 phút

      hmiChart.options.scales.x.max = now + futureGap;
      hmiChart.options.scales.x.min = now + futureGap - viewWindow;

      hmiChart.update('none');
      
      // Tự động cuộn nếu đang xem Live
      const v = document.getElementById('viewport');
      if (v.scrollLeft + v.clientWidth >= v.scrollWidth - 100) {
        scrollToEnd();
      }
    }
  });
</script>
</body>
</html>
