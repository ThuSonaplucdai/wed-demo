<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCADA HMI PRO - 24H MASTER SYSTEM</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

  <style>
    :root {
      --bg: #020617; --card: #1e293b; --primary: #38bdf8;
      --success: #10b981; --danger: #ef4444; --text: #f8fafc;
    }
    body { 
      margin: 0; font-family: 'Inter', sans-serif; 
      background: var(--bg); color: var(--text); overflow-x: hidden;
    }

    /* 1. THANH THÔNG BÁO TỐC ĐỘ 25 */
    #status-bar {
      position: fixed; top: 0; width: 100%; height: 35px; line-height: 35px;
      z-index: 9999; font-weight: bold; text-align: center; display: none;
    }

    /* 2. TRANG CHỦ */
    .container { max-width: 1200px; margin: auto; padding: 60px 20px; }
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
    .card-item {
      background: var(--card); border-radius: 24px; padding: 20px;
      border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer;
    }
    .card-item:hover { transform: translateY(-10px); border-color: var(--primary); }
    .is-locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

    /* 3. TRANG CHI TIẾT SCADA */
    .page-detail { display: none; animation: fadeIn 0.5s; padding: 20px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }
    .nav-top {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card); padding: 15px 25px; border-radius: 15px; margin-bottom: 20px;
    }
    .scada-main { display: grid; grid-template-columns: 300px 1fr; gap: 20px; flex-grow: 1; min-height: 0; }
    
    .monitor-box {
      background: var(--card); padding: 20px; border-radius: 15px;
      border-left: 6px solid var(--primary); margin-bottom: 15px;
    }
    .val-large { font-size: 40px; font-weight: 800; }
    
    .chart-container { 
      background: #0f172a; border-radius: 15px; padding: 20px; 
      border: 1px solid rgba(255,255,255,0.05); position: relative;
    }

    .btn-action {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-weight: bold; cursor: pointer; margin-top: 10px;
    }

    .alarm-active { animation: pulse 1s infinite; border-left-color: var(--danger) !important; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 100% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div id="status-bar"></div>

<div id="home-view" class="container">
  <h1 style="text-align:center; color:var(--primary)">HỆ THỐNG SCADA TRỰC TUYẾN</h1>
  <div class="grid-layout">
    <div class="card-item" onclick="showPage('detail-view')">
      <div style="font-size: 50px; text-align: center;">📊</div>
      <h3>Trạm Giám Sát 01</h3>
      <p style="color: #64748b; font-size: 13px;">Hỗ trợ lưu trữ 24h & Zoom XY thông minh.</p>
      <button class="btn-action" style="background: var(--primary);">MỞ TRẠM</button>
    </div>
    <div class="card-item is-locked">
      <div style="font-size: 50px; text-align: center;">🔒</div>
      <h3>Trạm Giám Sát 02</h3>
      <button class="btn-action" style="background: #334155;" disabled>BẢO TRÌ</button>
    </div>
  </div>
</div>

<div id="detail-view" class="page-detail" style="display:none">
  <div class="nav-top">
    <button onclick="showPage('home-view')" style="background:#334155; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">⬅ QUAY LẠI</button>
    <div id="clock" style="font-family: monospace; color: var(--primary);">00:00:00</div>
  </div>

  <div class="scada-main">
    <div class="sidebar">
      <div class="monitor-box" id="box-temp">
        <small style="color:#94a3b8">TEMPERATURE</small>
        <div class="val-large"><span id="txt-temp">--</span>°C</div>
      </div>
      <div class="monitor-box" style="border-left-color: var(--success);">
        <small style="color:#94a3b8">HUMIDITY</small>
        <div class="val-large"><span id="txt-hum">--</span>%</div>
      </div>
      <button class="btn-action" style="background:var(--primary)" onclick="resetToLive()">XEM TRỰC TIẾP</button>
      <button class="btn-action" style="background:#475569; color:white;" onclick="hmiChart.resetZoom()">RESET ZOOM</button>
    </div>

    <div class="chart-container">
      <canvas id="hmiChart"></canvas>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBWRpQCnDWV5YQpoXZ_o7aqfGdv_7yUT38",
    authDomain: "wed-demo-d236a.firebaseapp.com",
    databaseURL: "https://wed-demo-d236a-default-rtdb.firebaseio.com",
    projectId: "wed-demo-d236a",
    storageBucket: "wed-demo-d236a.firebasestorage.app",
    messagingSenderId: "410178635616",
    appId: "1:410178635616:web:c4d513a888176847198005"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let isLive = true;

  // CHUYỂN TRANG
  function showPage(id) {
    document.getElementById('home-view').style.display = (id === 'home-view' ? 'block' : 'none');
    document.getElementById('detail-view').style.display = (id === 'detail-view' ? 'flex' : 'none');
  }

  // KHỞI TẠO BIỂU ĐỒ CHUẨN NGUYÊN TẮC ZOOM XY
  const ctx = document.getElementById('hmiChart').getContext('2d');
  const hmiChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        { label: 'Nhiệt độ', data: [], borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', fill: true, tension: 0.4, pointRadius: 0 },
        { label: 'Độ ẩm', data: [], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.05)', fill: true, tension: 0.4, pointRadius: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { type: 'time', time: { unit: 'second' }, grid: { color: 'rgba(255,255,255,0.03)' } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: false }
      },
      plugins: {
        zoom: {
          pan: { enabled: true, mode: 'xy', onPanStart: () => isLive = false },
          zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy', onZoomStart: () => isLive = false }
        }
      }
    }
  });

  function resetToLive() { isLive = true; hmiChart.update(); }

  // CẬP NHẬT DỮ LIỆU & LƯU TRỮ 24H
  db.ref("data").on("value", (snap) => {
    const val = snap.val();
    if (val) {
      const now = new Date();
      const t = parseFloat(val.temp);
      const h = parseFloat(val.hum);

      document.getElementById("txt-temp").innerText = t;
      document.getElementById("txt-hum").innerText = h;
      document.getElementById("clock").innerText = now.toLocaleTimeString();

      // Alarm
      if(t > 45) document.getElementById("box-temp").classList.add("alarm-active");
      else document.getElementById("box-temp").classList.remove("alarm-active");

      // Push & Filter 24h
      hmiChart.data.datasets[0].data.push({ x: now, y: t });
      hmiChart.data.datasets[1].data.push({ x: now, y: h });
      
      const limit24h = now.getTime() - (24 * 60 * 60 * 1000);
      hmiChart.data.datasets.forEach(ds => {
        ds.data = ds.data.filter(p => p.x.getTime() > limit24h);
      });

      if (isLive) {
        hmiChart.options.scales.x.max = now.getTime();
        hmiChart.options.scales.x.min = now.getTime() - (5 * 60 * 1000);
      }
      hmiChart.update('none');
    }
  });

  // STATUS BAR TỐC ĐỘ 25
  const bar = document.getElementById("status-bar");
  db.ref(".info/connected").on("value", (snap) => {
    if (snap.val() === true) {
      bar.className = "bg-success"; bar.style.display = "block"; bar.style.background = "#10b981";
      bar.innerHTML = `<marquee scrollamount="25" loop="1">✅ KẾT NỐI THÀNH CÔNG - HỆ THỐNG LƯU TRỮ 24 GIỜ SẴN SÀNG</marquee>`;
      setTimeout(() => bar.style.display = "none", 8000);
    } else {
      bar.className = "bg-error"; bar.style.display = "block"; bar.style.background = "#ef4444";
      bar.innerHTML = `<marquee scrollamount="20">⚠️ CẢNH BÁO: MẤT KẾT NỐI SERVER!</marquee>`;
    }
  });
</script>
</body>
</html>
